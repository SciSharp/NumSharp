# =============================================================================
# NpyIter Benchmark — decoupled, post-release, semi-manual.
#
# Runs the canonical NumSharp-vs-NumPy NpyIter benchmark
# (benchmark/npyiter/npyiter_sheet.py) AFTER the "Build and Release" workflow
# succeeds, OR on demand via the Actions "Run workflow" button. It is a SEPARATE
# workflow from the release pipeline on purpose — a failed/slow benchmark must
# never block or gate a release.
#
# It commits the refreshed results sheet + the two 400x300 README cards straight
# to master (the user-chosen publish target). The "[skip ci]" in the commit
# message stops that push from re-triggering "Build and Release".
#
# NOTE on numbers: GitHub runners are shared, variable hardware. ABSOLUTE ms are
# not comparable run-to-run; the sheet/cards are RATIO-based (NumPy / NumSharp on
# the SAME runner in the SAME job), which stays meaningful. numpy is pinned for
# cross-release stability.
# =============================================================================
name: NpyIter Benchmark

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: npyiter-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    # Decoupled gate: only after a SUCCESSFUL release run, or a manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: 'preview'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps (pin numpy for cross-release comparability)
        run: pip install "numpy==2.4.2" matplotlib

      - name: Build NumSharp.Core (Release)
        run: dotnet build src/NumSharp.Core/NumSharp.Core.csproj -c Release -v q --nologo -p:WarningLevel=0

      - name: Run NpyIter benchmark sheet
        # Section-isolated + retry + incremental tsv: the intermittent AV under
        # heavy mixed load can't void the run. Reuses the Release build above.
        run: python benchmark/npyiter/npyiter_sheet.py --skip-build

      - name: Render README cards (400x300 x2)
        run: python benchmark/npyiter/npyiter_cards.py

      - name: Commit results + cards to master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark/npyiter/npyiter_results.md \
                  benchmark/npyiter/npyiter_results.tsv \
                  benchmark/npyiter/cards/ops.png \
                  benchmark/npyiter/cards/cat.png
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          git commit -m "bench(npyiter): refresh release benchmark sheet + cards [skip ci]"
          git push origin HEAD:master
